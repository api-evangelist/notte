aid: notte
name: Notte
review:
  question: Does Notte expose a documented public WebSocket / streaming event API that warrants an AsyncAPI document?
  answer: false
  date: '2026-06-20'
  reviewer: API Evangelist
  asyncapiSpecCreated: false
  asyncapiScopeNote: |
    No Notte-authored asynchronous event API (WebSocket message streams,
    Server-Sent Events, or webhooks pushed by Notte) is documented as part of
    the api.notte.cc REST surface. Agent and session progress are retrieved by
    polling REST status endpoints, not by subscribing to an event stream.
    Therefore no AsyncAPI document was created. A WebSocket transport does
    exist, but it is the standard Chrome DevTools Protocol (CDP) endpoint of the
    remote browser (surfaced as cdp_url / ws_url for Playwright, Puppeteer,
    Selenium, browser-use, and Stagehand to connect to). CDP is a third-party
    browser-control protocol, not a Notte application event API, so it is out of
    scope for AsyncAPI modeling.
findings:
  summary: |
    Notte publishes a documented public REST API at https://api.notte.cc with
    Bearer (API key) authentication and a machine-generated OpenAPI document at
    https://api.notte.cc/openapi.json (OpenAPI 3.1.0, title "Notte API"). The
    surface covers sessions, the perception layer (page observe / execute /
    scrape / screenshot), autonomous agents, one-shot scraping and AI web
    search, personas, vaults, profiles, secrets, file storage, and serverless
    functions. Asynchronous work (agent runs, session lifetime) is observed by
    polling REST status endpoints (GET /agents/{agent_id}, GET
    /sessions/{session_id}). The only WebSocket surface is the remote browser's
    Chrome DevTools Protocol endpoint (cdp_url / ws_url from
    /sessions/{session_id}/debug), used by external automation frameworks to
    drive the browser - it is not a Notte event API. Session replay is delivered
    as a downloadable WEBP, and a live viewer URL streams the browser visually;
    neither is a structured application event API. The core framework is open
    source under SSPL-1.0.
  transports:
    - protocol: REST
      scheme: https
      baseURL: https://api.notte.cc
      documented: true
    - protocol: WebSocket
      scheme: wss
      documented: true
      note: >-
        Chrome DevTools Protocol (CDP) endpoint of the remote browser, surfaced
        as cdp_url / ws_url via /sessions/{session_id}/debug for external
        frameworks (Playwright, Puppeteer, Selenium, browser-use) to connect to.
        This is a browser-control protocol, not a Notte-authored event API, so
        no AsyncAPI document was modeled for it.
    - protocol: SSE
      scheme: https
      documented: false
      note: No Server-Sent Events stream is documented for the Notte REST API; agent/session progress is polled.
    - protocol: Webhooks
      scheme: https
      documented: false
      note: >-
        No outbound Notte-pushed webhook catalog is documented. A notifier_config
        on agent runs can send notifications, but no public webhook event schema
        is published.
  endpointsConfirmedRest:
