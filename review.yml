    - GET    https://api.notte.cc/sessions/{session_id}/debug
    - GET    https://api.notte.cc/sessions/{session_id}/replay
    - GET    https://api.notte.cc/sessions/{session_id}/cookies
    - POST   https://api.notte.cc/sessions/{session_id}/cookies
    - POST   https://api.notte.cc/sessions/{session_id}/page/observe
    - POST   https://api.notte.cc/sessions/{session_id}/page/execute
    - POST   https://api.notte.cc/sessions/{session_id}/page/scrape
    - POST   https://api.notte.cc/sessions/{session_id}/page/screenshot
    - POST   https://api.notte.cc/agents/start
    - GET    https://api.notte.cc/agents
    - GET    https://api.notte.cc/agents/{agent_id}
    - DELETE https://api.notte.cc/agents/{agent_id}/stop
    - GET    https://api.notte.cc/agents/{agent_id}/workflow/code
    - POST   https://api.notte.cc/scrape
    - POST   https://api.notte.cc/scrape_from_html
