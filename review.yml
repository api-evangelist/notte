sources:
  - url: https://api.notte.cc/openapi.json
    type: OpenAPI
    note: Machine-generated OpenAPI 3.1.0; all paths are HTTPS REST under https://api.notte.cc.
  - url: https://docs.notte.cc/api-reference/authentication
    type: APIReference
    note: Bearer API key in Authorization header; base URL https://api.notte.cc.
  - url: https://docs.notte.cc/llms.txt
    type: Documentation
    note: Full documentation map of API and SDK reference pages; no event/streaming API listed.
  - url: https://docs.notte.cc/api-reference/sessions/session-debug-info
    type: APIReference
    note: Exposes cdp_url / ws_url (Chrome DevTools Protocol) and viewer URL for the remote browser.
  - url: https://github.com/nottelabs/notte
    type: GitHub
    note: Open-source core framework (SSPL-1.0); confirms REST API at api.notte.cc with Bearer auth.
actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No Notte-authored asynchronous event API exists. The REST surface was
    modeled in openapi/notte-openapi.yml and registered across five sub-APIs in
    apis.yml. The CDP WebSocket transport is documented in this review as a
    transport note rather than an AsyncAPI document, because it is the browser's
    DevTools protocol rather than a Notte application event API.
