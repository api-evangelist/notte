meters:
- name: subscription_fee
  description: Monthly subscription per tier (Developer $20, Startup $100), which grants the credit allowance.
  unit: subscription
  aggregation: sum
  dimensions:
  - account
  - plan
- name: session_hours
  description: Cloud browser session compute, billed against credits at $0.05/hour.
  unit: hours
  aggregation: sum
  dimensions:
  - account
  - session
- name: function_hours
  description: Serverless browser function compute, billed against credits at $0.05/hour.
  unit: hours
  aggregation: sum
  dimensions:
  - account
  - function
- name: proxy_gigabytes
  description: Residential proxy bandwidth, billed against credits at $10/GB.
  unit: gigabytes
  aggregation: sum
  dimensions:
  - account
  - session
- name: llm_tokens
  description: LLM tokens consumed by agents, billed at pass-through cost with no markup.
  unit: tokens
  aggregation: sum
  dimensions:
  - account
  - model
- name: credits_consumed
  description: Aggregate credit balance drawn down across sessions, functions, proxies, and LLM tokens.
  unit: credits
  aggregation: sum
  dimensions:
  - account
- name: credit_topups
  description: Non-expiring credits purchased via manual top-up.
  unit: credits
  aggregation: sum
  dimensions:
  - account
principles:
- name: Visibility
  description: Pull Notte usage and usage-logs endpoints (/usage, /usage/logs) to inspect credit burn by session, function, proxy, and LLM tokens.
- name: Allocation
  description: Tag API keys, sessions, and functions per workload/team; map credit consumption to internal cost centers.
- name: Optimization
  description: Cap max_session and max_steps; reuse sessions; prefer headless; self-host the open-source framework where viable; choose cheaper reasoning models given pass-through LLM pricing; right-size the subscription tier to monthly credit usage.
- name: Accountability
  description: Assign owners per project/key; review monthly credit spend against the plan allowance before allocation credits expire.
