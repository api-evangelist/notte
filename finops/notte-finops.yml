description: >-
  FinOps view of Notte spend. Notte bills a monthly subscription per tier
  (Developer $20, Startup $100, Enterprise custom) that grants a credit
  allowance, then meters credit consumption: browser sessions and functions at
  $0.05/hour, residential proxies at $10/GB, and LLM tokens at pass-through cost
  with no markup. Free credits and manual top-ups do not expire; monthly
  allocation credits expire monthly. Because the core framework is open source
  (SSPL-1.0), teams can self-host to shift some browser/agent compute off the
  managed bill and pay Notte only for managed capacity they actually use.
notes: >-
  Per-tier prices and usage rates are subject to change; verify against the
  Notte pricing page during reconciliation.
